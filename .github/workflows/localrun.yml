name: Flask App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt

      - name: Build Docker image
        run: docker build -t actions-app:latest .

      - name: Run container
        run: docker run -d -p 4000:4000 --name flask-container actions-app:latest

      - name: Test application
        run: |
          sleep 5
          curl -s http://localhost:4000/health
