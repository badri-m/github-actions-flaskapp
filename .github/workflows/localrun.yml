name: Flask App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  actions-tryout:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code (1)
        uses: actions/checkout@v4

      - name: Install dependencies (2)
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt

      - name: Build Docker image (3)
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ vars.NAME }}:latest .

      - name: Run container (4)
        run: docker run -d -p 4000:4000 --name flask-container ${{ secrets.DOCKER_USERNAME }}/${{ vars.NAME }}:latest

      - name: Test application (5)
        id: test_app
        run: |
          sleep 5
          if curl -fs http://localhost:4000/health; then
            echo "status=up" >> "$GITHUB_OUTPUT"
          else
            echo "status=down" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: docker login (6)
        if: steps.test_app.outputs.status == 'up'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker push (7)
        run: docker push ${{ secrets.DOCKER_USERNAME }}/${{ vars.NAME }}:latest
