name: Run Flask App Locally 

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]  

jobs:
    run-app:
      runs-on: self-hosted

      steps:
        - name: checkout code
          uses: actions/checkout@v4
        
        - name: set up python
          uses: actions/setup-python@v5
          with:
            python-version: '3.11'  

        - name: install dependencies
          run: |
            python -m pip install --upgrade pip
            pip install -r src/requirements.txt

        - name: run flask app
          run: |
              cd src
              python app.py    


        
