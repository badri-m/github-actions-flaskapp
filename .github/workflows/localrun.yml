name: Flask App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  actions-tryout:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ vars.NAME }}:latest .

      - name: Run container
        run: docker run -d -p 4000:4000 --name flask-container ${{ secrets.DOCKER_USERNAME }}/${{ vars.NAME }}:latest    

      - name: Test application
        run: |
          sleep 5
          curl -s http://localhost:4000/health

      - name: docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker push
        run: docker push ${{ secrets.DOCKER_USERNAME }}/${{ vars.NAME }}:latest  
              
