name: deploy to EC2

on:
  workflow_run:
    workflows: ["ci pipeline"]
    types:
      - completed

jobs:
    aws-ec2:
        runs-on: ubuntu-latest

        steps:
            - name: checkout code
              uses: actions/checkout@v4

            - name: Deploy to EC2
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.EC2_HOST }}
                  username: ${{ secrets.EC2_USER }}
                  key: ${{ secrets.EC2_SSH_KEY }}
                  script: |
                        sudo apt update
                        if ! command -v docker &> /dev/null
                        then
                            echo "Installing Docker..."
                            sudo apt install docker.io -y
                            sudo systemctl start docker
                            sudo systemctl enable docker
                        fi

                        sudo docker stop flask-container || true
                        sudo docker rm flask-container || true
                        sudo docker pull ${{ secrets.DOCKER_USERNAME }}/${{vars.NAME}}:latest
                        sudo docker run -d -p 4000:4000 --name flask-container ${{ secrets.DOCKER_USERNAME }}/${{vars.NAME}}:latest
                         


  